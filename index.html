  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d3d 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .container {
      background: rgba(255,255,255,0.96);
      border-radius: 18px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #ff6b00, #ff3d00);
      color: #fff;
      padding: 28px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.5rem;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .form-body {
      padding: 24px 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #333;
      font-size: 0.92rem;
    }

    input, select {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ff6b00;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #ff6b00, #ff3d00);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .msg {
      margin-bottom: 16px;
      padding: 13px;
      border-radius: 10px;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .msg.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    .msg.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    .footer {
      text-align: center;
      padding: 14px 20px 20px;
      color: #666;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .hidden-bot-field {
      position: absolute !important;
      left: -9999px !important;
      top: -9999px !important;
      opacity: 0 !important;
      pointer-events: none !important;
      height: 0 !important;
      width: 0 !important;
      overflow: hidden !important;
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 1.3rem; }
      .form-body { padding: 20px 16px; }
    }
  </style>
</head>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyL54Fr6OO4lp_sUI7uvPAXnmcYHI8O79udtDjGZGWTXcczQa1_r_LEC9cN2o9GCNLT/exec";

    const form = document.getElementById("inscricaoForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btnEnviar");
    const telefone = document.getElementById("telefone");

    telefone.addEventListener("input", function (e) {
      let v = e.target.value.replace(/\D/g, "");
      if (v.length > 11) v = v.slice(0, 11);

      if (v.length > 6) {
        v = "(" + v.slice(0, 2) + ") " + v.slice(2, 7) + "-" + v.slice(7);
      } else if (v.length > 2) {
        v = "(" + v.slice(0, 2) + ") " + v.slice(2);
      } else if (v.length > 0) {
        v = "(" + v;
      }

      e.target.value = v;
    });

    function mostrarMensagem(tipo, texto) {
      msg.className = "msg " + tipo;
      msg.textContent = texto;
    }

    function validarDados(dados) {
      if (!dados.nome || dados.nome.length < 3) {
        return "Informe um nome válido.";
      }

      const idadeNum = Number(dados.idade);
      if (!dados.idade || Number.isNaN(idadeNum) || idadeNum < 5 || idadeNum > 120) {
        return "Informe uma idade válida.";
      }

      const telefoneNumeros = dados.telefone.replace(/\D/g, "");
      if (telefoneNumeros.length < 10 || telefoneNumeros.length > 11) {
        return "Informe um telefone válido com DDD.";
      }

      if (dados.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(dados.email)) {
        return "Informe um e-mail válido.";
      }

      if (!dados.cidade || dados.cidade.length < 2) {
        return "Informe a cidade.";
      }

      if (!dados.categoria) {
        return "Selecione uma categoria.";
      }

      return null;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      msg.className = "msg";
      msg.textContent = "";

      const dados = {
        nome: form.nome.value.trim(),
        idade: form.idade.value.trim(),
        telefone: form.telefone.value.trim(),
        email: form.email.value.trim(),
        cidade: form.cidade.value.trim(),
        categoria: form.categoria.value.trim(),
        website: form.website.value.trim()
      };

      const erro = validarDados(dados);
      if (erro) {
        mostrarMensagem("error", erro);
        return;
      }

      btn.disabled = true;
      btn.textContent = "Enviando...";

      try {
        const resposta = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(dados)
        });

        const resultado = await resposta.json();

        if (resultado.ok) {
          mostrarMensagem("success", resultado.mensagem || "Inscrição realizada com sucesso!");
          form.reset();
        } else {
          mostrarMensagem("error", resultado.mensagem || "Não foi possível enviar.");
        }
      } catch (erroRede) {
        mostrarMensagem("error", "Erro de conexão. Tente novamente em instantes.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Realizar inscrição";
      }
    });
  </script>
</body>
</html>
